<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brommy Kneipe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Markante Serif/Display-Schrift für die Überschriften im Gastro-Look -->
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Plus+Jakarta+Sans:wght@300..800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .font-brush { font-family: 'Permanent+Marker', 'Plus Jakarta Sans', sans-serif; font-weight: 400; }
        .nav-active { color: #f59e0b !important; border-bottom: 2px solid #f59e0b; }
        .nav-inactive { color: #ffffff; opacity: 0.8; }
        .nav-inactive:hover { opacity: 1; color: #f59e0b; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fadeIn { animation: fadeIn 0.4s ease-out forwards; }
    </style>
</head>
<body class="bg-[#0b0f17] text-slate-300 min-h-screen flex flex-col antialiased">

    <!-- Premium Navigation -->
    <nav class="bg-[#0f172a]/95 backdrop-blur border-b border-slate-800 sticky top-0 z-50 shadow-xl">
        <div class="max-w-6xl mx-auto px-6">
            <div class="flex items-center justify-between h-20">
                <div class="flex-shrink-0">
                    <button data-tab="home" class="tab-btn text-xl sm:text-2xl font-black text-white tracking-wider cursor-pointer bg-transparent border-0 flex items-center gap-2 hover:text-amber-500 transition">
                        BROMMY <span class="text-amber-500">KNEIPE</span>
                    </button>
                </div>
                <div class="flex space-x-6 sm:space-x-8">
                    <button data-tab="home" class="tab-btn nav-active pb-1 text-sm font-bold tracking-wide transition cursor-pointer bg-transparent border-0 uppercase">Home</button>
                    <button data-tab="speisen" class="tab-btn nav-inactive pb-1 text-sm font-bold tracking-wide transition cursor-pointer bg-transparent border-0 uppercase">Speisen</button>
                    <button data-tab="kontakt" class="tab-btn nav-inactive pb-1 text-sm font-bold tracking-wide transition cursor-pointer bg-transparent border-0 uppercase">Kontakt</button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content Dynamic Wrapper -->
    <main class="flex-grow max-w-6xl w-full mx-auto px-4 sm:px-6 py-8" id="view-target">
        <!-- Injected via JS -->
    </main>

    <!-- Footer -->
    <footer class="bg-[#090d16] text-slate-600 text-center py-8 text-xs border-t border-slate-900 mt-auto tracking-widest">
        <p>© 2026 BROMMY KNEIPE. ALL RIGHTS RESERVED.</p>
    </footer>

    <script type="module">
        import { speisenKategorien } from './components/speisen.js';
        import { kontaktDaten } from './components/kontakt.js';

        const tabButtons = document.querySelectorAll('.tab-btn');
        const viewTarget = document.getElementById('view-target');

        // Automatisches Remote-Logging
        async function updateVisits() {
            try {
                const currentHost = window.location.hostname;
                let logUrl = 'http://localhost:8080/api/log';
                if (currentHost.includes('github.dev')) {
                    const baseUrl = currentHost.split('.github.dev')[0].replace(/-[0-9]+$/, '');
                    logUrl = `https://${baseUrl}-8080.github.dev/api/log`;
                } else {
                    logUrl = `https://humble-cod-xr55gq7r55663v54x-8080.github.dev/api/log`;
                }
                await fetch(logUrl, { mode: 'cors' });
            } catch(e) {}
        }
        updateVisits();

        function renderTab(tabName) {
            let html = `<div class="animate-fadeIn space-y-12">`;

            if (tabName === 'home') {
                html += `
                    <!-- Hero Section im Street-Flavor-Stil -->
                    <div class="relative bg-gradient-to-r from-[#111827] via-[#0f172a] to-[#1e1b4b] rounded-3xl border border-slate-800/80 shadow-2xl overflow-hidden p-8 sm:p-16 text-left flex flex-col md:flex-row items-center gap-8 min-h-[420px]">
                        <div class="absolute inset-0 bg-[radial-gradient(circle_at_top_right,_var(--tw-gradient-stops))] from-amber-500/10 via-transparent to-transparent opacity-70"></div>
                        <div class="relative z-10 max-w-xl space-y-6 flex-1">
                            <span class="text-amber-500 uppercase tracking-widest font-bold text-xs sm:text-sm bg-amber-500/10 border border-amber-500/20 px-3 py-1 rounded-full">Klassiker & Gemütlichkeit</span>
                            <h1 class="text-4xl sm:text-6xl font-black text-white leading-tight uppercase font-brush">
                                Echte Kneipe.<br><span class="text-amber-500">Echter Geschmack.</span>
                            </h1>
                            <p class="text-slate-400 text-base sm:text-lg leading-relaxed max-w-md font-light">
                                Frisch gezapftes Bier, ehrliche Kneipen-Klassiker und eine Atmosphäre, in der man gerne versackt.
                            </p>
                            <div class="flex flex-wrap gap-4 pt-2">
                                <button onclick="document.querySelector('[data-tab=speisen]').click()" class="bg-amber-500 hover:bg-amber-600 text-[#090d16] font-bold text-sm px-6 py-3 rounded-xl transition duration-200 shadow-lg shadow-amber-500/20 uppercase tracking-wider cursor-pointer border-0">
                                    Unsere Karte
                                </button>
                                <button onclick="document.querySelector('[data-tab=kontakt]').click()" class="bg-transparent hover:bg-slate-800 text-white border border-slate-700 font-bold text-sm px-6 py-3 rounded-xl transition uppercase tracking-wider cursor-pointer">
                                    Hier finden
                                </button>
                            </div>
                        </div>
                        <!-- Platzhalter für Kneipen-Atmosphäre-Grafik / Rechts -->
                        <div class="relative hidden md:flex items-center justify-center flex-1 w-full h-full min-h-[250px] bg-slate-900/40 rounded-2xl border border-slate-800/50 backdrop-blur-sm p-6 text-center">
                            <span class="text-slate-600 font-mono text-xs uppercase tracking-widest">[ Gemütliches Ambiente Bild ]</span>
                        </div>
                    </div>
                    
                    <!-- Feature Row (Genau wie die Icons im Vorbild) -->
                    <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 sm:gap-6">
                        <div class="bg-[#0f172a]/60 border border-slate-800/80 p-5 rounded-2xl flex items-start gap-4 hover:border-slate-700 transition">
                            <div class="text-amber-500 text-2xl mt-0.5">🍺</div>
                            <div>
                                <h4 class="text-white font-bold text-sm sm:text-base uppercase tracking-wide">Kühles Blondes</h4>
                                <p class="text-slate-500 text-xs sm:text-sm mt-0.5 font-light">Frisch gezapft & perfekt temperiert.</p>
                            </div>
                        </div>
                        <div class="bg-[#0f172a]/60 border border-slate-800/80 p-5 rounded-2xl flex items-start gap-4 hover:border-slate-700 transition">
                            <div class="text-amber-500 text-2xl mt-0.5">🍳</div>
                            <div>
                                <h4 class="text-white font-bold text-sm sm:text-base uppercase tracking-wide">Ehrliche Küche</h4>
                                <p class="text-slate-500 text-xs sm:text-sm mt-0.5 font-light">Klassiker ohne viel Schnickschnack.</p>
                            </div>
                        </div>
                        <div class="bg-[#0f172a]/60 border border-slate-800/80 p-5 rounded-2xl flex items-start gap-4 hover:border-slate-700 transition">
                            <div class="text-amber-500 text-2xl mt-0.5">🌿</div>
                            <div>
                                <h4 class="text-white font-bold text-sm sm:text-base uppercase tracking-wide">Beste Zutaten</h4>
                                <p class="text-slate-500 text-xs sm:text-sm mt-0.5 font-light">Frisch eingekauft, lokal zubereitet.</p>
                            </div>
                        </div>
                        <div class="bg-[#0f172a]/60 border border-slate-800/80 p-5 rounded-2xl flex items-start gap-4 hover:border-slate-700 transition">
                            <div class="text-amber-500 text-2xl mt-0.5">❤️</div>
                            <div>
                                <h4 class="text-white font-bold text-sm sm:text-base uppercase tracking-wide">Mit Herz</h4>
                                <p class="text-slate-500 text-xs sm:text-sm mt-0.5 font-light">Bei uns bist du unter Freunden.</p>
                            </div>
                        </div>
                    </div>

                    <!-- Über Uns Teaser -->
                    <div class="bg-[#0f172a] border border-slate-800/80 p-8 sm:p-10 rounded-3xl shadow-sm space-y-4 relative overflow-hidden">
                        <span class="text-xs font-bold text-amber-500 tracking-widest uppercase">Unsere Story</span>
                        <h3 class="text-2xl sm:text-3xl font-black text-white font-brush">Kneipenkultur aus Leidenschaft</h3>
                        <p class="text-slate-400 leading-relaxed text-sm sm:text-base font-light max-w-2xl">
                            Wir lieben gesellige Runden, ein ehrliches Wort und gutes Essen. Die Brommy Kneipe steht für Tradition gepaart mit modernem Komfort in einer entspannten Kulisse. Komm vorbei, schnapp dir ein Glas und schalt ab.
                        </p>
                    </div>`;
            } 
            
            else if (tabName === 'speisen') {
                html += `
                    <div class="text-center max-w-xl mx-auto py-4 space-y-2">
                        <span class="text-xs font-bold text-amber-500 tracking-widest uppercase">Für den großen & kleinen Hunger</span>
                        <h2 class="text-3xl sm:text-5xl text-white font-black tracking-tight font-brush uppercase">Speisekarte</h2>
                        <div class="h-[2px] w-12 bg-amber-500 mx-auto mt-4"></div>
                    </div>`;

                speisenKategorien.forEach(kat => {
                    html += `
                        <div class="space-y-4 mt-12">
                            <h3 class="text-xl font-extrabold text-white tracking-wider border-b border-slate-800 pb-3 uppercase"><span class="text-amber-500">//</span> ${kat.kategorieName}</h3>
                            <div class="grid md:grid-cols-2 gap-4 sm:gap-6">`;
                    
                    kat.items.forEach(item => {
                        html += `
                            <div class="bg-[#0f172a] rounded-2xl border border-slate-800/70 p-6 flex flex-col justify-between hover:border-amber-500/40 hover:bg-[#11192e] transition duration-300 shadow-sm group">
                                <div class="space-y-2">
                                    <div class="flex justify-between items-baseline gap-4">
                                        <h4 class="font-bold text-slate-100 text-base sm:text-lg group-hover:text-amber-500 transition">${item.name}</h4>
                                        <span class="text-amber-500 font-mono font-black text-sm sm:text-base bg-amber-500/10 px-3 py-1 rounded-xl border border-amber-500/20">${item.price}</span>
                                    </div>
                                    <p class="text-slate-400 text-xs sm:text-sm leading-relaxed font-light">${item.description || ''}</p>
                                </div>
                            </div>`;
                    });
                    
                    html += `</div></div>`;
                });
            } 
            
            else if (tabName === 'kontakt') {
                html += `
                    <div class="bg-[#0f172a] border border-slate-800/80 rounded-3xl p-8 space-y-3 shadow-sm text-center md:text-left">
                        <span class="text-xs font-bold text-amber-500 tracking-widest uppercase">Immer für dich da</span>
                        <h2 class="text-2xl sm:text-3xl font-black text-white font-brush">${kontaktDaten.infoTitel || 'Kontakt'}</h2>
                        <p class="text-slate-400 font-light leading-relaxed text-sm sm:text-base max-w-xl">${kontaktDaten.infoText || 'Hier findest du alle Wege zu uns.'}</p>
                    </div>

                    <div class="grid sm:grid-cols-2 gap-6">
                        <div class="bg-[#0f172a] border border-slate-800 p-6 rounded-2xl text-center flex flex-col justify-between items-center space-y-4 hover:border-slate-700 transition">
                            <div class="space-y-1.5">
                                <h3 class="text-base font-bold text-slate-100 uppercase tracking-wide">E-Mail schreiben</h3>
                                <p class="text-slate-500 text-xs sm:text-sm px-4">Für Reservierungen, Events oder Feedback.</p>
                            </div>
                            <a href="mailto:${kontaktDaten.email}" class="inline-block w-full bg-slate-800 hover:bg-amber-500 hover:text-[#090d16] text-white border border-slate-700 font-bold px-4 py-3 rounded-xl transition text-center no-underline text-xs tracking-widest uppercase">
                                Nachricht senden
                            </a>
                        </div>

                        <div class="bg-[#0f172a] border border-slate-800 p-6 rounded-2xl text-center flex flex-col justify-between items-center space-y-4 hover:border-slate-700 transition">
                            <div class="space-y-1.5">
                                <h3 class="text-base font-bold text-slate-100 uppercase tracking-wide">WhatsApp Support</h3>
                                <p class="text-slate-500 text-xs sm:text-sm px-4">Der schnellste Draht direkt an die Theke.</p>
                            </div>
                            <a href="https://wa.me/${kontaktDaten.telefon ? kontaktDaten.telefon.replace('+', '') : ''}" target="_blank" rel="noopener noreferrer" class="inline-block w-full bg-slate-800 hover:bg-amber-500 hover:text-[#090d16] text-white border border-slate-700 font-bold px-4 py-3 rounded-xl transition text-center no-underline text-xs tracking-widest uppercase">
                                Chat starten
                            </a>
                        </div>
                    </div>

                    <div class="grid md:grid-cols-2 gap-6">
                        <div class="bg-[#0f172a] p-6 sm:p-8 rounded-2xl border border-slate-800 space-y-4">
                            <h3 class="text-lg font-bold text-white uppercase tracking-wider flex items-center gap-2"><span class="text-amber-500">⏰</span> Öffnungszeiten</h3>
                            <div class="space-y-2.5 text-xs sm:text-sm text-slate-400">
                                ${kontaktDaten.zeiten ? kontaktDaten.zeiten.map(z => `<div class="flex justify-between border-b border-slate-800/40 pb-2"><span>${z.tage}</span> <span class="font-bold text-slate-200 font-mono">${z.uhrzeit}</span></div>`).join('') : 'Keine Zeiten hinterlegt'}
                            </div>
                            ${kontaktDaten.ruhetag ? `<p class="text-amber-500 font-bold text-[11px] tracking-widest bg-amber-500/10 py-1.5 px-3 rounded-xl border border-amber-500/20 inline-block m-0 mt-1 uppercase">${kontaktDaten.ruhetag}</p>` : ''}
                        </div>
                        
                        <div class="bg-[#0f172a] p-6 sm:p-8 rounded-2xl border border-slate-800 flex flex-col justify-between space-y-4">
                            <div>
                                <h3 class="text-lg font-bold text-white uppercase tracking-wider flex items-center gap-2"><span class="text-amber-500">📍</span> Standort</h3>
                                <p class="text-slate-400 text-xs sm:text-sm leading-relaxed mt-3 whitespace-pre-line font-light">${kontaktDaten.adresse || 'Adresse folgt'}</p>
                            </div>
                            <div class="bg-[#090d16] p-3 rounded-xl border border-slate-800 flex items-center justify-between">
                                <span class="text-slate-400 text-xs font-mono select-all break-all pr-2">📧 ${kontaktDaten.email}</span>
                            </div>
                        </div>
                    </div>`;
            }

            html += `</div>`;
            viewTarget.innerHTML = html;
        }

        // Tab Event Listener Logic
        tabButtons.forEach(button => {
            button.addEventListener('click', () => {
                const targetTab = button.getAttribute('data-tab');
                renderTab(targetTab);
                
                // Setzt die aktiven Nav-Klassen richtig
                document.querySelectorAll('.tab-btn').forEach(btn => {
                    if (btn.getAttribute('data-tab') === targetTab && btn.innerText !== 'BROMMY KNEIPE') {
                        btn.className = 'tab-btn nav-active pb-1 text-sm font-bold tracking-wide transition cursor-pointer bg-transparent border-0 uppercase';
                    } else if (btn.innerText !== 'BROMMY KNEIPE') {
                        btn.className = 'tab-btn nav-inactive pb-1 text-sm font-bold tracking-wide transition cursor-pointer bg-transparent border-0 uppercase';
                    }
                });
            });
        });

        renderTab('home');
    </script>
</body>
</html>
