<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brommy Kneipe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300..800&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'Plus Jakarta Sans', -apple-system, sans-serif;
        }
        .nav-active { 
            background-color: #ffffff !important; 
            color: #0f172a !important; 
            font-weight: 700 !important;
        }
        .nav-inactive { 
            color: #94a3b8 !important; 
        }
        .nav-inactive:hover { 
            color: #ffffff !important; 
            background-color: #1e293b !important; 
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fadeIn { animation: fadeIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="bg-[#090d16] text-slate-200 min-h-screen flex flex-col antialiased">

    <!-- Clean Premium Navigation -->
    <nav class="bg-[#0f172a] border-b border-slate-800/80 sticky top-0 z-50 shadow-md">
        <div class="max-w-5xl mx-auto px-6">
            <div class="flex items-center justify-between h-20">
                <div class="flex-shrink-0">
                    <button data-tab="home" class="tab-btn text-xl font-extrabold text-white tracking-tight cursor-pointer bg-transparent border-0 flex items-center gap-2 hover:opacity-80 transition">
                        BROMMY KNEIPE
                    </button>
                </div>
                <div class="flex space-x-1 sm:space-x-2 bg-[#020617] p-1 rounded-xl border border-slate-800">
                    <button data-tab="home" class="tab-btn nav-active px-4 py-2 rounded-lg text-sm font-semibold transition cursor-pointer border-0">Home</button>
                    <button data-tab="speisen" class="tab-btn nav-inactive px-4 py-2 rounded-lg text-sm font-semibold transition cursor-pointer border-0">Speisen</button>
                    <button data-tab="kontakt" class="tab-btn nav-inactive px-4 py-2 rounded-lg text-sm font-semibold transition cursor-pointer border-0">Kontakt</button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Body Area -->
    <main class="flex-grow max-w-4xl w-full mx-auto px-6 py-12" id="view-target">
        <!-- Injected via JS -->
    </main>

    <footer class="bg-[#020617] text-slate-600 text-center py-8 text-xs border-t border-slate-900 mt-auto tracking-widest">
        <p>© 2026 BROMMY KNEIPE. ALL RIGHTS RESERVED.</p>
    </footer>

    <script type="module">
        import { speisenKategorien } from './components/speisen.js';
        import { kontaktDaten } from './components/kontakt.js';

        const tabButtons = document.querySelectorAll('.tab-btn');
        const viewTarget = document.getElementById('view-target');

        // Funktion sendet den Log-Ping an deinen lokalen Codespace-Server auf Port 8080
        async function updateVisits() {
            try {
                const currentHost = window.location.hostname;
                let logUrl = 'http://localhost:8080/api/log';

                // Falls du im GitHub Codespace testest, baut sich die URL automatisch für Port 8080 um
                if (currentHost.includes('github.dev')) {
                    const baseUrl = currentHost.split('.github.dev')[0];
                    // Schneidet alte Ports ab, falls vorhanden, und setzt 8080 hart
                    const cleanBase = baseUrl.replace(/-[0-9]+$/, '');
                    logUrl = `https://${cleanBase}-8080.github.dev/api/log`;
                } 
                // Falls du auf der echten Domain bist, funkt sie an deine feste Codespace-URL
                else {
                    logUrl = `https://humble-cod-xr55gq7r55663v54x-8080.github.dev/api/log`;
                }

                await fetch(logUrl, { mode: 'cors' });
            } catch(e) {
                // Fängt Fehler ab, wenn der lokale Server mal aus ist
            }
        }
        updateVisits();

        function renderTab(tabName) {
            let html = `<div class="animate-fadeIn space-y-10">`;

            if (tabName === 'home') {
                html += `
                    <div class="relative bg-gradient-to-b from-[#1e293b] to-[#0f172a] text-white py-20 px-8 text-center rounded-2xl border border-slate-800 shadow-xl">
                        <div class="relative z-10 max-w-xl mx-auto space-y-3">
                            <h1 class="text-3xl sm:text-5xl font-black tracking-tight text-white">Brommy Kneipe</h1>
                            <p class="text-slate-400 text-base sm:text-lg max-w-md mx-auto leading-relaxed">Frisches Bier, ehrliche Klassiker & gemütliche Runden.</p>
                        </div>
                    </div>
                    
                    <div class="bg-[#0f172a] border border-slate-800 p-8 rounded-2xl shadow-sm space-y-3">
                        <h3 class="text-xl font-bold text-white">Willkommen</h3>
                        <p class="text-slate-400 leading-relaxed text-sm sm:text-base font-light">
                            Entdecke unser uriges Ambiente im Herzen der Stadt. Nutze ganz bequem das obere Menü, um direkt in unsere Speisekarte reinzuschauen oder unsere Öffnungszeiten einzusehen. Wir freuen uns auf deinen Besuch!
                        </p>
                    </div>`;
            } 
            
            else if (tabName === 'speisen') {
                html += `
                    <div class="text-center max-w-xl mx-auto py-2 space-y-1">
                        <h2 class="text-2xl sm:text-4xl text-white font-black tracking-tight">Speisekarte</h2>
                        <div class="h-[2px] w-8 bg-white mx-auto mt-3"></div>
                    </div>`;

                speisenKategorien.forEach(kat => {
                    html += `
                        <div class="space-y-4 mt-8">
                            <h3 class="text-lg font-bold text-white tracking-wide border-b border-slate-800 pb-2">${kat.kategorieName}</h3>
                            <div class="grid sm:grid-cols-2 gap-4">`;
                    
                    kat.items.forEach(item => {
                        html += `
                            <div class="bg-[#0f172a] rounded-xl border border-slate-800/60 p-5 flex flex-col justify-between hover:border-slate-700 transition duration-200">
                                <div class="space-y-1.5">
                                    <div class="flex justify-between items-baseline gap-4">
                                        <h4 class="font-semibold text-slate-200 text-sm sm:text-base">${item.name}</h4>
                                        <span class="text-white font-mono font-bold text-xs sm:text-sm bg-slate-800 px-2 py-0.5 rounded border border-slate-700">${item.price}</span>
                                    </div>
                                    <p class="text-slate-500 text-xs sm:text-sm leading-relaxed">${item.description || ''}</p>
                                </div>
                            </div>`;
                    });
                    
                    html += `</div></div>`;
                });
            } 
            
            else if (tabName === 'kontakt') {
                html += `
                    <div class="bg-[#0f172a] border border-slate-800 rounded-2xl p-6 space-y-2 shadow-sm">
                        <h2 class="text-xl font-bold text-white">${kontaktDaten.infoTitel || 'Kontakt'}</h2>
                        <p class="text-slate-400 font-light leading-relaxed text-sm">${kontaktDaten.infoText || 'Hier findest du alle Wege zu uns.'}</p>
                    </div>

                    <div class="grid sm:grid-cols-2 gap-4">
                        <div class="bg-[#0f172a] border border-slate-800 p-5 rounded-xl text-center flex flex-col justify-between items-center space-y-3 hover:border-slate-700 transition">
                            <div class="space-y-1">
                                <h3 class="text-sm font-bold text-slate-200">E-Mail schreiben</h3>
                                <p class="text-slate-500 text-xs px-2">Für Reservierungen oder größere Feiern.</p>
                            </div>
                            <a href="mailto:${kontaktDaten.email}" class="inline-block w-full bg-slate-800 hover:bg-slate-700 text-white border border-slate-700 font-semibold px-4 py-2 rounded-lg transition text-center no-underline text-xs tracking-wider uppercase">
                                Nachricht senden
                            </a>
                        </div>

                        <div class="bg-[#0f172a] border border-slate-800 p-5 rounded-xl text-center flex flex-col justify-between items-center space-y-3 hover:border-slate-700 transition">
                            <div class="space-y-1">
                                <h3 class="text-sm font-bold text-slate-200">WhatsApp Chat</h3>
                                <p class="text-slate-500 text-xs px-2">Schneller Support direkt aufs Smartphone.</p>
                            </div>
                            <a href="https://wa.me/${kontaktDaten.telefon ? kontaktDaten.telefon.replace('+', '') : ''}" target="_blank" rel="noopener noreferrer" class="inline-block w-full bg-slate-800 hover:bg-slate-700 text-white border border-slate-700 font-semibold px-4 py-2 rounded-lg transition text-center no-underline text-xs tracking-wider uppercase">
                                Chat starten
                            </a>
                        </div>
                    </div>

                    <div class="grid md:grid-cols-2 gap-4">
                        <div class="bg-[#0f172a] p-5 rounded-xl border border-slate-800 space-y-3">
                            <h3 class="text-base font-bold text-white">⏰ Öffnungszeiten</h3>
                            <div class="space-y-2 text-xs sm:text-sm text-slate-400">
                                ${kontaktDaten.zeiten ? kontaktDaten.zeiten.map(z => `<div class="flex justify-between border-b border-slate-800/40 pb-1.5"><span>${z.tage}</span> <span class="font-medium text-slate-300 font-mono">${z.uhrzeit}</span></div>`).join('') : 'Keine Zeiten hinterlegt'}
                            </div>
                            ${kontaktDaten.ruhetag ? `<p class="text-slate-400 font-semibold text-[10px] tracking-wider bg-slate-800 py-1 px-2.5 rounded border border-slate-700 inline-block m-0 mt-1">${kontaktDaten.ruhetag.toUpperCase()}</p>` : ''}
                        </div>
                        
                        <div class="bg-[#0f172a] p-5 rounded-xl border border-slate-800 flex flex-col justify-between space-y-3">
                            <div>
                                <h3 class="text-base font-bold text-white">📍 Standort</h3>
                                <p class="text-slate-400 text-xs sm:text-sm leading-relaxed mt-2 whitespace-pre-line font-light">${kontaktDaten.adresse || 'Adresse folgt'}</p>
                            </div>
                            <p class="text-slate-400 text-xs font-mono bg-[#020617] p-2.5 rounded-lg border border-slate-800 m-0 break-all select-all">📧 ${kontaktDaten.email}</p>
                        </div>
                    </div>`;
            }

            html += `</div>`;
            viewTarget.innerHTML = html;
        }

        tabButtons.forEach(button => {
            button.addEventListener('click', () => {
                const targetTab = button.getAttribute('data-tab');
                renderTab(targetTab);
                tabButtons.forEach(btn => {
                    if (btn.getAttribute('data-tab') === targetTab) {
                        btn.className = 'tab-btn nav-active px-4 py-2 rounded-lg text-sm font-semibold transition cursor-pointer border-0';
                    } else {
                        btn.className = 'tab-btn nav-inactive px-4 py-2 rounded-lg text-sm font-semibold transition cursor-pointer border-0';
                    }
                });
            });
        });

        renderTab('home');
    </script>
</body>
</html>
